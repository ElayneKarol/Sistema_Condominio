<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Solicitar Cadastro - Residencial Premium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-box">
        <div class="logo">
            <h1>RESIDENCIAL PREMIUM</h1>
            <p class="subtitle">Solicitação de Acesso ao Condomínio</p>
        </div>

        <form id="cadastroForm">
            <div class="input-group">
                <label>Nome Completo</label>
                <input type="text" id="nome" placeholder="Seu nome" required>
            </div>
            <div class="input-group">
                <label>E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>
            <div class="input-group">
                <label>CPF</label>
                <input type="text" id="cpf" placeholder="000.000.000-00" required>
            </div>
            <div class="input-group">
                <label for="telefone">Telefone</label>
                <input type="tel" id="telefone" placeholder="(00) 00000-0000" required>
            </div>
            <div class="input-group">
                <label>Unidade (Apto/Bloco)</label>
                <input type="text" id="endereco" placeholder="Ex: Apto 102" required>
            </div>
            <div class="input-group">
                <label>Senha</label>
                <input type="password" id="senha" placeholder="Crie uma senha" required>
            </div>

            <button type="submit" id="btnCadastrar">Solicitar Cadastro</button>
        </form>

        <div class="footer">
            <p>Já tem uma conta? <a href="index.html">Fazer Login</a></p>
        </div>
    </div>

    <script>
        document.getElementById('cadastroForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const dados = {
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                cpf: document.getElementById('cpf').value,
                telefone: document.getElementById('telefone').value,
                endereco: document.getElementById('endereco').value,
                senha: document.getElementById('senha').value,
                perfil: 'MORADOR' // Valor padrão
            };

            try {
                const response = await fetch('http://localhost:3000/api/cadastrar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });

                const result = await response.json();

                if (response.ok) {
                    alert('Solicitação enviada com sucesso! Aguarde a aprovação.');
                    window.location.href = 'index.html';
                } else {
                    alert('Erro: ' + result.detalhes);
                }
            } catch (error) {
                alert('Erro ao conectar com o servidor.');
            }
        });
    </script>
</body>
</html>
