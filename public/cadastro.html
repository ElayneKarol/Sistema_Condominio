<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Solicitar Cadastro - Residencial Premium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-box">
        <div class="logo">
            <h1>RESIDENCIAL PREMIUM</h1>
            <p class="subtitle">Solicitação de Acesso ao Condomínio</p>
        </div>

        <form id="cadastroForm">
            <div class="input-group">
                <label>Nome Completo</label>
                <input type="text" id="nome" placeholder="Seu nome" required>
            </div>
            <div class="input-group">
                <label>E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>
            <div class="input-group">
                <label>CPF</label>
                <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" required>
            </div>
            <div class="input-group">
                <label>Telefone</label>
                <input type="tel" id="telefone" placeholder="(00) 00000-0000" maxlength="15" required>
            </div>
            <div class="input-group">
                <label>Unidade (Apto/Bloco)</label>
                <input type="text" id="endereco" placeholder="Ex: Apto 102" required>
            </div>
            <div class="input-group">
                <label>Senha</label>
                <input type="password" id="senha" placeholder="Crie uma senha" required>
            </div>
            
            <div class="input-group">
                <label>Confirmar Senha</label>
                <input type="password" id="confirmarSenha" placeholder="Digite a senha novamente" required>
            </div>

            <button type="submit" id="btnCadastrar">Solicitar Cadastro</button>
        </form>

        <div class="footer">
            <p>Já tem uma conta? <a href="index.html">Fazer Login</a></p>
        </div>
    </div>

    <script>
        // ==========================================
        // MÁSCARAS DE FORMATAÇÃO AUTOMÁTICA
        // ==========================================
        
        // Máscara para o CPF
        const inputCpf = document.getElementById('cpf');
        if (inputCpf) {
            inputCpf.addEventListener('input', function (e) {
                let valor = e.target.value.replace(/\D/g, ''); // Remove tudo que não for número
                
                // Aplica a formatação: 000.000.000-00
                valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
                valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
                valor = valor.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
                
                e.target.value = valor;
            });
        }

        // Máscara para o Telefone
        const inputTelefone = document.getElementById('telefone');
        if (inputTelefone) {
            inputTelefone.addEventListener('input', function (e) {
                let valor = e.target.value.replace(/\D/g, ''); // Remove tudo que não for número
                
                // Aplica a formatação: (00) 00000-0000
                valor = valor.replace(/^(\d{2})(\d)/g, '($1) $2');
                valor = valor.replace(/(\d)(\d{4})$/, '$1-$2');
                
                e.target.value = valor;
            });
        }
        document.getElementById('cadastroForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const senha = document.getElementById('senha').value;
            const confirmarSenha = document.getElementById('confirmarSenha').value;
            // VERIFICAÇÃO DE SENHA
            if (senha !== confirmarSenha) {
                alert("As senhas não coincidem! Por favor, digite senhas iguais.");
                return; // O 'return' faz o código parar aqui e não envia pro servidor
            }
            
            // Pega TODOS os dados da tela
            const dados = {
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                cpf: document.getElementById('cpf').value,
                telefone: document.getElementById('telefone').value,
                endereco: document.getElementById('endereco').value,
                senha: document.getElementById('senha').value
            };

            try {
                const response = await fetch('http://localhost:3000/api/cadastrar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });

                const result = await response.json();

                if (response.ok) {
                    alert(result.mensagem);
                    window.location.href = 'index.html'; 
                } else {
                    alert('Erro: ' + result.erro);
                }
            } catch (error) {
                console.error("Erro detalhado:", error);
                alert('Erro ao conectar com o servidor.');
            }
        });
    </script>
</body>
</html>
