<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerir Avisos - Administração</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }

        body { background-color: #f3f4f6; display: flex; height: 100vh; overflow: hidden; }

        /* --- SIDEBAR ADMIN (IGUAL A PENDÊNCIAS) --- */
        .sidebar {
            width: 280px;
            background-color: #111827; 
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px 0;
        }

        .profile-section {
            padding: 0 20px 30px 20px;
            border-bottom: 1px solid #374151;
            margin-bottom: 20px;
        }

        .profile-section img {
            width: 60px; height: 60px; border-radius: 50%;
            margin-bottom: 15px; border: 2px solid #10b981; 
        }

        .profile-section h2 { color: #10b981; } 

        .nav-links { display: flex; flex-direction: column; gap: 5px; padding: 0 15px; flex: 1; }

        .nav-item {
            display: flex; align-items: center; padding: 12px 15px;
            color: #cbd5e1; text-decoration: none; border-radius: 10px;
            font-size: 15px; transition: 0.3s; gap: 15px;
        }

        .nav-item:hover { background-color: #374151; color: white; }
        .nav-item.active { background-color: #064e3b; color: white; border: 1px solid #10b981; } 

        /* --- CONTEÚDO PRINCIPAL --- */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h1 { color: #111827; font-size: 28px; }
        .btn-add { background-color: #10b981; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-add:hover { background-color: #059669; }

        /* --- CARDS DE AVISO --- */
        .grid-avisos { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .card-aviso { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); display: flex; flex-direction: column; justify-content: space-between; position: relative; border-left: 6px solid #3b82f6; }
        
        /* Cores dinâmicas baseadas no tipo de aviso */
        .card-aviso.geral { border-left-color: #3b82f6; }
        .card-aviso.importante { border-left-color: #f59e0b; }
        .card-aviso.urgente { border-left-color: #ef4444; }

        .aviso-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .aviso-titulo { font-size: 18px; color: #111827; font-weight: bold; margin-right: 40px; }
        .badge-tipo { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        
        .badge-tipo.geral { background-color: #dbeafe; color: #1e40af; }
        .badge-tipo.importante { background-color: #fef3c7; color: #92400e; }
        .badge-tipo.urgente { background-color: #fee2e2; color: #991b1b; }

        .aviso-mensagem { color: #4b5563; font-size: 14px; line-height: 1.6; margin-bottom: 20px; flex: 1; white-space: pre-wrap; }
        .aviso-footer { display: flex; justify-content: space-between; align-items: center; color: #9ca3af; font-size: 12px; border-top: 1px solid #f3f4f6; padding-top: 12px; }
        
        .btn-delete { background: none; border: none; color: #ef4444; cursor: pointer; font-weight: 600; font-size: 13px; transition: 0.2s; padding: 4px 8px; border-radius: 4px; }
        .btn-delete:hover { background-color: #fee2e2; }

        /* --- MODAL DE CRIAÇÃO --- */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .modal-overlay.ativo { display: flex; }
        .modal-card { background: white; width: 550px; padding: 30px; border-radius: 12px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .modal-card h2 { margin-bottom: 20px; color: #111827; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 14px; font-weight: 500; color: #4b5563; }
        .form-group input, .form-group select, .form-group textarea { padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 15px; }
        .form-group textarea { resize: none; height: 120px; }
        .modal-buttons { display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px; }
        .btn-action { padding: 10px 18px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s; }
</style>
</head>
<body>

    <aside class="sidebar">
        <div>
            <div class="profile-section">
            <img src="https://media.istockphoto.com/id/1495088043/pt/vetorial/user-profile-icon-avatar-or-person-icon-profile-picture-portrait-symbol-default-portrait.jpg?s=612x612&w=0&k=20&c=S7d8ImMSfoLBMCaEJOffTVua003OAl2xUnzOsuKIwek=" alt="Avatar">
                <h2>Administração</h2>
                <p>Painel de Controle</p>
            </div>

            <nav class="nav-links">
                <a href="admin-dashboard.html" class="nav-item"><span></span> Pendências</a>
                <a href="gerenciar_usuarios.html" class="nav-item"><span></span> Moradores</a>
                <a href="gerenciar_locais.html" class="nav-item"><span></span> Locais e Áreas</a>
                <a href="gerenciar_avisos.html" class="nav-item active"><span></span> Avisos</a>
            </nav>
        </div>
        <div style="padding: 20px 15px;">
            <a href="index.html" class="nav-item"><span>🚪</span> Sair</a>
        </div>
    </aside>

    <div class="main-content">
        <div class="header">
            <h1>Mural de Comunicados e Avisos</h1>
            <button class="btn-add" onclick="abrirModal()">Criar Novo Aviso</button>
        </div>

        <div class="grid-avisos" id="containerAvisos">
            </div>
    </div>

    <div id="modalAviso" class="modal-overlay">
        <div class="modal-card">
            <h2>Publicar Novo Comunicado</h2>
            <div class="form-group">
                <label for="avisoTitulo">Título do Comunicado</label>
                <input type="text" id="avisoTitulo" placeholder="Ex: Manutenção Preventiva dos Elevadores">
            </div>
            <div class="form-group">
                <label for="avisoTipo">Grau de Importância</label>
                <select id="avisoTipo">
                    <option value="geral">Geral (Informativo)</option>
                    <option value="importante">Importante (Atenção)</option>
                    <option value="urgente">Urgente (Ação Necessária)</option>
                </select>
            </div>
            <div class="form-group">
                <label for="avisoMensagem">Mensagem / Texto Completo</label>
                <textarea id="avisoMensagem" placeholder="Escreva detalhadamente as regras, horários ou informações importantes para os moradores..."></textarea>
            </div>
            <div class="modal-buttons">
                <button class="btn-action" style="background:#e5e7eb; color:#374151;" onclick="fecharModal()">Cancelar</button>
                <button class="btn-action" style="background:#10b981; color:white;" onclick="publicarAviso()">Publicar no Mural</button>
            </div>
        </div>
    </div>

    <div id="modalConfirmacao" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 10000; align-items: center; justify-content: center; backdrop-filter: blur(3px);">
        <div style="background: white; width: 420px; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; border-top: 8px solid #ef4444;">
            <div style="font-size: 48px; margin-bottom: 15px;">🗑️</div>
            <h2 style="color: #1f2937; margin-bottom: 10px; font-size: 22px;">Remover Comunicado?</h2>
            <p style="color: #4b5563; font-size: 15px; line-height: 1.5; margin-bottom: 25px;">Esta ação é permanente. O aviso sairá imediatamente do mural de todos os moradores.</p>
            <div style="display: flex; gap: 12px; justify-content: center;">
                <button onclick="fecharModalConfirmacao()" style="background: #e5e7eb; color: #374151; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; width: 50%;">Cancelar</button>
                <button id="btnConfirmarExclusao" style="background: #ef4444; color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; width: 50%;">Apagar Aviso</button>
            </div>
        </div>
    </div>

    <div id="modalFeedback" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 10001; align-items: center; justify-content: center; backdrop-filter: blur(3px);">
        <div style="background: white; width: 400px; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; border-top: 8px solid #10b981;" id="cardFeedback">
            <div id="iconeFeedback" style="font-size: 48px; margin-bottom: 15px;">✔️</div>
            <h2 id="tituloFeedback" style="color: #1f2937; margin-bottom: 10px; font-size: 22px;">Sucesso!</h2>
            <p id="mensagemFeedback" style="color: #4b5563; font-size: 15px; line-height: 1.5; margin-bottom: 25px;">Operação realizada.</p>
            <button onclick="fecharModalFeedback()" style="background: #111827; color: white; border: none; padding: 10px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 15px; transition: 0.2s; width: 100%;">
                Entendido
            </button>
        </div>
    </div>

    <script>
        let idAvisoParaApagar = null;

        window.onload = function() {
            carregarAvisos();
        };

        // --- FUNÇÕES DOS MODAIS DE FEEDBACK E CONFIRMAÇÃO ---
        function mostrarModalFeedback(titulo, mensagem, tipo = 'sucesso') {
            const modal = document.getElementById('modalFeedback');
            const card = document.getElementById('cardFeedback');
            const icone = document.getElementById('iconeFeedback');
            const txtTitulo = document.getElementById('tituloFeedback');
            const txtMensagem = document.getElementById('mensagemFeedback');

            txtTitulo.innerText = titulo;
            txtMensagem.innerText = message = mensagem;

            if (tipo === 'sucesso') {
                card.style.borderTopColor = '#10b981';
                icone.innerText = '✔️';
                txtTitulo.style.color = '#065f46';
            } else {
                card.style.borderTopColor = '#ef4444';
                icone.innerText = '⚠️';
                txtTitulo.style.color = '#991b1b';
            }
            modal.style.display = 'flex';
        }

        function fecharModalFeedback() {
            document.getElementById('modalFeedback').style.display = 'none';
        }

        function abrirModalConfirmacao(id) {
            idAvisoParaApagar = id;
            document.getElementById('modalConfirmacao').style.display = 'flex';
            
            // Atribui o clique dinamicamente ao botão vermelho de confirmação
            document.getElementById('btnConfirmarExclusao').onclick = executarExclusao;
        }

        function fecharModalConfirmacao() {
            document.getElementById('modalConfirmacao').style.display = 'none';
            idAvisoParaApagar = null;
        }

        function abrirModal() {
            document.getElementById('modalAviso').classList.add('ativo');
        }

        function fecharModal() {
            document.getElementById('modalAviso').classList.remove('ativo');
            document.getElementById('avisoTitulo').value = '';
            document.getElementById('avisoMensagem').value = '';
            document.getElementById('avisoTipo').value = 'geral';
        }

        // --- CARREGAR AVISOS ---
        async function carregarAvisos() {
            try {
                const response = await fetch('http://localhost:3000/api/avisos');
                const avisos = await response.json();
                renderizarAvisos(avisos);
            } catch (error) {
                console.error("Erro ao carregar avisos:", error);
                mostrarModalFeedback('Erro de Rede', 'Não foi possível buscar os avisos do servidor.', 'erro');
            }
        }

        function renderizarAvisos(avisos) {
            const container = document.getElementById('containerAvisos');
            container.innerHTML = '';

            if (avisos.length === 0) {
                container.innerHTML = `<p style="color:#6b7280; font-style:italic; grid-column: 1/-1; text-align:center; padding: 40px;">Nenhum comunicado publicado no mural até ao momento.</p>`;
                return;
            }

            avisos.forEach(aviso => {
                const card = document.createElement('div');
                card.className = `card-aviso ${aviso.tipo}`;

                const dataFormatada = new Date(aviso.data_criacao).toLocaleDateString('pt-BR', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                card.innerHTML = `
                    <div>
                        <div class="aviso-header">
                            <div class="aviso-titulo">${aviso.titulo}</div>
                            <span class="badge-tipo ${aviso.tipo}">${aviso.tipo}</span>
                        </div>
                        <div class="aviso-mensagem">${aviso.mensagem}</div>
                    </div>
                    <div class="aviso-footer">
                        <span>Postado em: ${dataFormatada}</span>
                        <button class="btn-delete" onclick="abrirModalConfirmacao(${aviso.id})">Apagar</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // --- CRIAR / PUBLICAR AVISO ---
        async function publicarAviso() {
            const dados = {
                titulo: document.getElementById('avisoTitulo').value,
                tipo: document.getElementById('avisoTipo').value,
                mensagem: document.getElementById('avisoMensagem').value
            };

            if (!dados.titulo.trim() || !dados.mensagem.trim()) {
                mostrarModalFeedback('Campos Vazios', 'Por favor, preencha o título e a mensagem do comunicado.', 'erro');
                return;
            }

            try {
                const response = await fetch('http://localhost:3000/api/avisos', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });

                if (response.ok) {
                    fecharModal();
                    mostrarModalFeedback('Mural Atualizado', 'O comunicado foi publicado com sucesso para todos os moradores!', 'sucesso');
                    carregarAvisos();
                } else {
                    mostrarModalFeedback('Erro no Servidor', 'Não foi possível publicar o aviso neste momento.', 'erro');
                }
            } catch (erro) {
                console.error("Erro:", erro);
                mostrarModalFeedback('Erro de Conexão', 'Erro ao conectar ao servidor.', 'erro');
            }
        }

        // --- EXECUTAR APAGAR AVISO (CHAMADO PELO MODAL) ---
        async function executarExclusao() {
            if (!idAvisoParaApagar) return;

            try {
                const response = await fetch(`http://localhost:3000/api/avisos/${idAvisoParaApagar}`, {
                    method: 'DELETE'
                });

                fecharModalConfirmacao(); // Fecha o modal de perguntas "Sim/Não"

                if (response.ok) {
                    mostrarModalFeedback('Aviso Removido', 'O comunicado foi permanentemente apagado do mural.', 'sucesso');
                    carregarAvisos();
                } else {
                    mostrarModalFeedback('Erro na Operação', 'Não foi possível remover o comunicado do banco de dados.', 'erro');
                }
            } catch (erro) {
                console.error("Erro:", erro);
                fecharModalConfirmacao();
                mostrarModalFeedback('Erro de Rede', 'Não foi possível comunicar com o servidor.', 'erro');
            }
        }
    </script>
</body>
</html>
