<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Reservas - Residencial Premium</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }

        body { background-color: #e5e7eb; display: flex; height: 100vh; overflow: hidden; }

        /* --- SIDEBAR MORADOR --- */
        .sidebar { width: 280px; background-color: #0f172a; color: white; display: flex; flex-direction: column; justify-content: space-between; padding: 20px 0; }
        .profile-section { padding: 0 20px 30px 20px; border-bottom: 1px solid #1e293b; margin-bottom: 20px; }
        .profile-section img { width: 60px; height: 60px; border-radius: 50%; margin-bottom: 15px; border: 2px solid #3b82f6; }
        .profile-section h2 { font-size: 18px; color: #f8fafc; }
        .profile-section p { font-size: 14px; color: #94a3b8; }
        .nav-links { display: flex; flex-direction: column; gap: 5px; padding: 0 15px; flex: 1; }
        .nav-item { display: flex; align-items: center; padding: 12px 15px; color: #cbd5e1; text-decoration: none; border-radius: 8px; font-weight: 500; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background-color: #1e293b; color: white; border-left: 4px solid #3b82f6; }
        .logout-section { padding: 0 15px; }
        .btn-logout { width: 100%; padding: 12px; background-color: #ef4444; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-logout:hover { background-color: #dc2626; }

        /* --- CONTEÚDO PRINCIPAL --- */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .header h1 { color: #1e293b; font-size: 28px; }

        /* --- TABS --- */
        .tabs-container { display: flex; gap: 15px; margin-bottom: 25px; border-bottom: 2px solid #cbd5e1; padding-bottom: 10px; }
        .tab-button { background: none; border: none; font-size: 16px; font-weight: 600; color: #64748b; cursor: pointer; padding: 8px 16px; transition: 0.2s; position: relative; }
        .tab-button.active { color: #3b82f6; }
        .tab-button.active::after { content: ''; position: absolute; bottom: -12px; left: 0; width: 100%; height: 3px; background-color: #3b82f6; }

        .view-pane { display: none; }
        .view-pane.active { display: block; }

        /* --- GRID DE LOCAIS --- */
        .grid-locais { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .card-local { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); display: flex; flex-direction: column; transition: 0.3s; }
        .card-local:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .card-media { height: 160px; background-color: #cbd5e1; display: flex; align-items: center; justify-content: center; color: #475569; font-weight: bold; font-size: 18px; }
        .card-body { padding: 20px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .card-title { font-size: 20px; color: #1e293b; font-weight: 700; margin-bottom: 8px; }
        .card-desc { color: #64748b; font-size: 14px; line-height: 1.5; margin-bottom: 15px; flex: 1; }
        .card-info { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: #475569; font-weight: 600; margin-bottom: 20px; background: #f1f5f9; padding: 8px 12px; border-radius: 6px; }
        .btn-reserve { width: 100%; padding: 12px; background-color: #3b82f6; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; text-align: center; }
        .btn-reserve:hover { background-color: #2563eb; }

        /* --- TABELA DE MINHAS RESERVAS --- */
        .table-container { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background-color: #f8fafc; padding: 16px 24px; color: #64748b; font-weight: 600; border-bottom: 2px solid #e2e8f0; }
        td { padding: 16px 24px; color: #334155; border-bottom: 1px solid #e2e8f0; }
        
        .badge { padding: 6px 12px; border-radius: 50px; font-size: 13px; font-weight: 600; display: inline-block; }
        .badge.pendente { background-color: #fef3c7; color: #d97706; }
        .badge.aprovada { background-color: #d1fae5; color: #065f46; }
        .badge.recusada { background-color: #fee2e2; color: #991b1b; }
        .badge.cancelada { background-color: #e2e8f0; color: #475569; }

        .btn-cancel { background: none; border: none; color: #ef4444; font-weight: 600; cursor: pointer; font-size: 13px; padding: 6px 12px; border-radius: 4px; }
        .btn-cancel:hover { background-color: #fee2e2; }

        /* --- MODAL DE SOLICITAÇÃO --- */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .modal-overlay.ativo { display: flex; }
        .modal-card { background: white; width: 450px; padding: 30px; border-radius: 12px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .modal-card h2 { margin-bottom: 20px; color: #1e293b; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 14px; font-weight: 500; color: #475569; }
        .form-group input, .form-group select { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 15px; background: white; }
        .modal-buttons { display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px; }
        .btn-action { padding: 10px 18px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div>
            <div class="profile-section">
                <img src="https://via.placeholder.com/60" alt="Morador">
                <h2 id="nomeUsuario">Carregando...</h2>
                <p>Morador(a)</p>
            </div>
            <nav class="nav-links">
                <a href="dashboard.html" class="nav-item"><span>🏠</span> Início</a>
                <a href="reservas.html" class="nav-item active"><span>📅</span> Nova Reserva</a>
                <a href="perfil.html" class="nav-item "><span>👤</span> Meu Perfil</a>
            </nav>
        </div>
        <div style="padding: 20px 15px;">
            <a href="index.html" class="nav-item" onclick="localStorage.clear();"><span>🚪</span> Sair</a>
        </div>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Áreas Comuns e Reservas</h1>
        </div>

        <div class="tabs-container">
            <button class="tab-button active" onclick="alternarAba('locais')">Espaços Disponíveis</button>
            <button class="tab-button" onclick="alternarAba('minhas')">Minhas Solicitações</button>
        </div>

        <div id="paneLocais" class="view-pane active">
            <div class="grid-locais" id="listaAreas">
                </div>
        </div>

        <div id="paneMinhas" class="view-pane">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Local / Área Comum</th>
                            <th>Data Reservada</th>
                            <th>Período / Horário</th>
                            <th>Status do Pedido</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaMinhasReservas">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="modalReserva" class="modal-overlay">
        <div class="modal-card">
            <h2 id="modalReservaTitulo">Solicitar Espaço</h2>
            <input type="hidden" id="modalAreaId">
            
            <div class="form-group">
                <label for="reservaData">Escolha a Data</label>
                <input type="date" id="reservaData">
            </div>

            <div class="form-group">
                <label for="reservaHorario">Período Disponível</label>
                <select id="reservaHorario">
                    <option value="Manhã (08:00 às 12:00)">Manhã (08:00 às 12:00)</option>
                    <option value="Tarde (13:00 às 17:00)">Tarde (13:00 às 17:00)</option>
                    <option value="Noite (18:00 às 22:00)">Noite (18:00 às 22:00)</option>
                </select>
            </div>

            <div class="modal-buttons">
                <button class="btn-action" style="background:#cbd5e1; color:#334155;" onclick="fecharModal()">Cancelar</button>
                <button class="btn-action" style="background:#3b82f6; color:white;" onclick="enviarSolicitacaoReserva()">Confirmar Solicitação</button>
            </div>
        </div>
    </div>

    <div id="modalFeedback" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 10000; align-items: center; justify-content: center; backdrop-filter: blur(3px);">
        <div style="background: white; width: 400px; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; border-top: 8px solid #3b82f6;" id="cardFeedback">
            <div id="iconeFeedback" style="font-size: 48px; margin-bottom: 15px;">✔️</div>
            <h2 id="tituloFeedback" style="color: #1e293b; margin-bottom: 10px; font-size: 22px;">Sucesso!</h2>
            <p id="mensagemFeedback" style="color: #64748b; font-size: 15px; line-height: 1.5; margin-bottom: 25px;">Operação realizada.</p>
            <button onclick="fecharModalFeedback()" style="background: #0f172a; color: white; border: none; padding: 10px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 15px; transition: 0.2s; width: 100%;">
                Entendido
            </button>
        </div>
    </div>

    <script>
        // CORREÇÃO AQUI: Lê exatamente as chaves que o teu index.html gravou!
        const USUARIO_LOGADO_ID = parseInt(localStorage.getItem('usuarioId')) || 1;
        const USUARIO_LOGADO_NOME = localStorage.getItem('usuarioNome') || "Morador de Testes";

        window.onload = function() {
            // Aplica o nome do morador real na barra lateral
            document.getElementById('nomeUsuario').innerText = USUARIO_LOGADO_NOME;
            
            carregarAreasComuns();
            carregarMinhasReservas();
            
            // Define o dia mínimo no input de data como hoje
            const hoje = new Date().toISOString().split('T')[0];
            document.getElementById('reservaData').min = hoje;
        };

        // --- CONTROLE DOS MODAIS ---
        // ... o resto do teu código de reservas continua exatamente igual abaixo ...

        // --- CONTROLE DOS MODAIS ---
        function mostrarModalFeedback(titulo, mensagem, tipo = 'sucesso') {
            const modal = document.getElementById('modalFeedback');
            const card = document.getElementById('cardFeedback');
            const icone = document.getElementById('iconeFeedback');
            const txtTitulo = document.getElementById('tituloFeedback');
            const txtMensagem = document.getElementById('mensagemFeedback');

            txtTitulo.innerText = titulo;
            txtMensagem.innerText = mensagem;

            if (tipo === 'sucesso') {
                card.style.borderTopColor = '#10b981';
                icone.innerText = '✔️';
                txtTitulo.style.color = '#065f46';
            } else {
                card.style.borderTopColor = '#ef4444';
                icone.innerText = '⚠️';
                txtTitulo.style.color = '#991b1b';
            }
            modal.style.display = 'flex';
        }

        function fecharModalFeedback() {
            document.getElementById('modalFeedback').style.display = 'none';
        }

        function alternarAba(aba) {
            const btnLocais = document.querySelectorAll('.tab-button')[0];
            const btnMinhas = document.querySelectorAll('.tab-button')[1];
            
            if(aba === 'locais') {
                btnLocais.classList.add('active');
                btnMinhas.classList.remove('active');
                document.getElementById('paneLocais').classList.add('active');
                document.getElementById('paneMinhas').classList.remove('active');
            } else {
                btnLocais.classList.remove('active');
                btnMinhas.classList.add('active');
                document.getElementById('paneLocais').classList.remove('active');
                document.getElementById('paneMinhas').classList.add('active');
                carregarMinhasReservas(); // Força atualização ao mudar de aba
            }
        }

        function abrirModalReserva(id, nome) {
            document.getElementById('modalAreaId').value = id;
            document.getElementById('modalReservaTitulo').innerText = `Reservar: ${nome}`;
            document.getElementById('modalReserva').classList.add('ativo');
        }

        function fecharModal() {
            document.getElementById('modalReserva').classList.remove('ativo');
            document.getElementById('reservaData').value = '';
        }

        /* --- API INTERFACE --- */

        // 1. Carregar as Áreas do condomínio cadastradas no Banco
        async function carregarAreasComuns() {
            try {
                const response = await fetch('http://localhost:3000/api/areas');
                const areas = await response.json();
                
                const container = document.getElementById('listaAreas');
                container.innerHTML = '';

                areas.forEach(area => {
                    const card = document.createElement('div');
                    card.className = 'card-local';
                    card.innerHTML = `
                        <div class="card-media">📸 Espaço Comum</div>
                        <div class="card-body">
                            <div>
                                <div class="card-title">${area.nome}</div>
                                <div class="card-desc">${area.descricao || 'Espaço incrível para aproveitar momentos com a família.'}</div>
                            </div>
                            <div>
                                <div class="card-info">
                                    <span>Capacidade Max:</span>
                                    <span>${area.capacidade || area.capacity || 0} pessoas</span>
                                </div>
                                <button class="btn-reserve" onclick="abrirModalReserva(${area.id}, '${area.nome}')">Solicitar Reserva</button>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (err) {
                console.error(err);
                mostrarModalFeedback('Erro de Conexão', 'Não foi possível carregar a lista de locais.', 'erro');
            }
        }

        // 2. Enviar pedido de nova reserva ao banco de dados
        async function enviarSolicitacaoReserva() {
            const areaId = document.getElementById('modalAreaId').value;
            const dataVal = document.getElementById('reservaData').value;
            const horarioVal = document.getElementById('reservaHorario').value;

            if (!dataVal) {
                mostrarModalFeedback('Data Obrigatória', 'Por favor, selecione o dia que deseja efetuar sua reserva.', 'erro');
                return;
            }

            const dados = {
                usuario_id: USUARIO_LOGADO_ID,
                area_id: areaId,
                data_reserva: dataVal, // Envia 'AAAA-MM-DD' nativo direto
                horario: horarioVal
            };

            try {
                const response = await fetch('http://localhost:3000/api/reservas', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });

                const resultado = await response.json();

                if (response.ok) {
                    fecharModal();
                    mostrarModalFeedback('Reserva Solicitada', 'Sua solicitação foi salva! Aguarde a aprovação da administração.', 'sucesso');
                    alternarAba('minhas');
                } else {
                    mostrarModalFeedback('Indisponível', resultado.erro || 'Falha ao registrar reserva.', 'erro');
                }
            } catch (err) {
                console.error(err);
                mostrarModalFeedback('Erro Técnico', 'Erro de conexão com o servidor.', 'erro');
            }
        }

        // 3. Carregar o histórico de reservas pertencentes apenas ao usuário logado
        async function carregarMinhasReservas() {
            try {
                const response = await fetch(`http://localhost:3000/api/reservas/usuario/${USUARIO_LOGADO_ID}`);
                const reservas = await response.json();

                const tbody = document.getElementById('tabelaMinhasReservas');
                tbody.innerHTML = '';

                if(reservas.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#64748b; font-style:italic;">Você ainda não efetuou nenhuma solicitação.</td></tr>`;
                    return;
                }

                reservas.forEach(res => {
                    const dataFormatada = new Date(res.data_reserva).toLocaleDateString('pt-BR', { timeZone: 'UTC' });
                    
                    let acaoBotao = '';
                    if (res.status === 'PENDENTE' || res.status === 'APROVADA') {
                        acaoBotao = `<button class="btn-cancel" onclick="cancelarMinhaReserva(${res.id})">Cancelar</button>`;
                    } else {
                        acaoBotao = `<span style="color:#94a3b8; font-size:12px;">Sem ações</span>`;
                    }

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><strong>${res.area_nome}</strong></td>
                        <td>${dataFormatada}</td>
                        <td>${res.horario}</td>
                        <td><span class="badge ${res.status.toLowerCase()}">${res.status}</span></td>
                        <td>${acaoBotao}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                console.error(err);
            }
        }

        // 4. Cancelar uma reserva ativa do morador
        async function cancelarMinhaReserva(id) {
            try {
                const response = await fetch(`http://localhost:3000/api/reservas/${id}/cancelar`, {
                    method: 'PUT'
                });

                if (response.ok) {
                    mostrarModalFeedback('Cancelamento Feito', 'Sua reserva foi cancelada com sucesso.', 'sucesso');
                    carregarMinhasReservas();
                } else {
                    mostrarModalFeedback('Erro', 'Não foi possível cancelar a reserva.', 'erro');
                }
            } catch (err) {
                console.error(err);
            }
        }
    </script>
</body>
</html>
